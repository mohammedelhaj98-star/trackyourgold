services:
  - type: web
    name: trackyourgold-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run db:generate && npm run build --workspace @trackyourgold/shared && npm run build --workspace @trackyourgold/db && npm run build --workspace @trackyourgold/api
    startCommand: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma && npm run start --workspace @trackyourgold/api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEFAULT_CURRENCY
        value: QAR
      - key: WEB_APP_HOST
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
  - type: cron
    name: trackyourgold-ingest
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run db:generate && npm run build --workspace @trackyourgold/shared && npm run build --workspace @trackyourgold/db && npm run build --workspace @trackyourgold/worker
    startCommand: npm run ingest:all --workspace @trackyourgold/worker
    schedule: "*/10 * * * *"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEFAULT_CURRENCY
        value: QAR
      - key: MARKET_API_PROVIDER
        value: gold_api
      - key: MARKET_API_BASE_URL
        value: www.goldapi.io/api/XAU/USD
      - key: MARKET_API_KEY
        sync: false
      - key: MARKET_API_TIMEOUT_MS
        value: "8000"
      - key: MARKET_QAR_PER_USD
        value: "3.64"
      - key: MARKET_INGEST_EVERY_MINUTES
        value: "720"
      - key: RETAIL_INGEST_EVERY_MINUTES
        value: "15"
      - key: RETAIL_MALABAR_HOST
        sync: false
      - key: RETAIL_MALABAR_PATH
        sync: false
      - key: RETAIL_RATE_LIMIT_PER_MINUTE
        value: "1"
      - key: ROBOTS_CACHE_TTL_HOURS
        value: "24"
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: ALERT_MIN_SEVERITY
        value: warn
  - type: worker
    name: trackyourgold-worker
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run db:generate && npm run build --workspace @trackyourgold/shared && npm run build --workspace @trackyourgold/db && npm run build --workspace @trackyourgold/worker
    startCommand: npm run daemon --workspace @trackyourgold/worker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEFAULT_CURRENCY
        value: QAR
      - key: MARKET_API_PROVIDER
        value: gold_api
      - key: MARKET_API_BASE_URL
        value: www.goldapi.io/api/XAU/USD
      - key: MARKET_API_KEY
        sync: false
      - key: MARKET_API_TIMEOUT_MS
        value: "8000"
      - key: MARKET_QAR_PER_USD
        value: "3.64"
      - key: MARKET_INGEST_EVERY_MINUTES
        value: "720"
      - key: RETAIL_INGEST_EVERY_MINUTES
        value: "15"
      - key: RETAIL_MALABAR_HOST
        sync: false
      - key: RETAIL_MALABAR_PATH
        sync: false
      - key: RETAIL_RATE_LIMIT_PER_MINUTE
        value: "1"
      - key: ROBOTS_CACHE_TTL_HOURS
        value: "24"
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: ALERT_MIN_SEVERITY
        value: warn
